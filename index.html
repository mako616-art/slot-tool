<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>スロット期待値ツール</title>

<style>
body{
  background:#111;
  color:white;
  font-family:sans-serif;
  padding:20px;
}

.panel img{
  width:100%;
  max-width:800px;
  border-radius:10px;
}

select,input,button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:10px;
  font-size:16px;
}

button{
  background:orange;
  font-weight:bold;
}

.result{
  margin-top:20px;
  padding:20px;
  border-radius:12px;
  font-size:18px;
  white-space:pre-line;
}
</style>
</head>

<body>

<h1>🎰 スロット期待値ツール</h1>

<!-- ■ 画像（今まで通り） -->
<div class="panel">
  <img src="images/panel.jpg">
</div>

<!-- ■ 入力 -->
<select id="machine">
  <option value="カバネリ">カバネリ</option>
  <option value="モンキー">モンキーターンV</option>
  <option value="北斗">北斗の拳</option>
</select>

<input id="game" type="number" placeholder="現在G数">
<input id="through" type="number" placeholder="スルー回数（カバネリ用）">

<select id="shortened">
  <option value="false">通常</option>
  <option value="true">短縮（リセ/ST後）</option>
</select>

<button onclick="calc()">判定</button>

<div id="result" class="result"></div>

<script>

// =========================
// モンキー（実データ）
const monkeyEV = {
  0:-600,50:-453,100:-281,150:-81,200:152,
  250:424,300:740,350:1108,400:1537,
  450:2036,500:2617,550:3295,600:4084,
  650:5002,700:6072,750:7319
};

// =========================
// カバネリ（スルー別）
const kabaneriEV = {
  0:[-526,-76,637,1770,3568],
  50:[-129,320,1034,2166,3964],
  100:[344,793,1507,2639,4437],
  150:[-179,271,984,2117,3915],
  200:[83,533,1246,2379,4177],
  250:[406,855,1569,2701,4499],
  300:[-214,236,949,2082,3880],
  350:[-54,395,1109,2241,4039],
  400:[145,594,1308,2440,4238],
  450:[393,843,1556,2689,4487],
  500:[342,791,1505,2637,4435],
  550:[626,1075,1789,2922,4719],
  600:[981,1431,2144,3277,5075]
};

// =========================
// 北斗（簡易）
const hokutoEV = {
  200:-200,300:100,400:500,500:1000,600:2000
};

// =========================
// 近い値取得
function getNearest(map, g){
  let keys = Object.keys(map).map(Number);
  let nearest = keys.reduce((a,b)=>Math.abs(b-g)<Math.abs(a-g)?b:a);
  return map[nearest];
}

// =========================
// 判定処理
function calc(){

  const m = document.getElementById("machine").value;
  const g = parseInt(document.getElementById("game").value);
  const t = parseInt(document.getElementById("through").value) || 0;
  const shortened = document.getElementById("shortened").value === "true";
  const result = document.getElementById("result");

  if(isNaN(g)){
    result.innerText="G数入れろ";
    return;
  }

  let ev = 0;

  // モンキー
  if(m==="モンキー"){
    ev = getNearest(monkeyEV, g);
    if(shortened) ev += 700;
  }

  // カバネリ
  if(m==="カバネリ"){
    let base = getNearest(kabaneriEV, g);
    ev = base[Math.min(t,4)];
  }

  // 北斗
  if(m==="北斗"){
    ev = getNearest(hokutoEV, g);
  }

  // 判定
  let color="red";
  let judge="捨て";

  if(ev >= 1500){
    color="green";
    judge="打てる（強）";
  }
  else if(ev >= 1000){
    color="lime";
    judge="打てる";
  }
  else if(ev >= 500){
    color="orange";
    judge="保留";
  }

  result.style.background=color;

  result.innerText =
    "期待値：" + Math.round(ev) + "円\n" +
    "判定：" + judge;
}
</script>

</body>
</html>
